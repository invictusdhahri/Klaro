name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Node (lint + typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm turbo run lint --filter='!@klaro/ml'

      - name: Typecheck
        run: pnpm turbo run typecheck --filter='!@klaro/ml'

      - name: Build
        run: pnpm turbo run build --filter='!@klaro/ml'
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

  python:
    name: Python (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Sync deps
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest -q
